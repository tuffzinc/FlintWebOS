<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flint</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #121212;
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --ps-blue: #2b66ff;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      user-select: none;
    }

    body {
      height: 100vh;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 70% 30%, rgba(43, 102, 255, 0.15) 0%, transparent 60%);
      color: var(--text-main);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-image 0.5s ease;
    }

    /* Top Navigation Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 60px;
      z-index: 10;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .nav-link {
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-link.active {
      color: var(--text-main);
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 1rem;
      font-weight: 400;
    }

    .profile-icon {
      width: 35px;
      height: 35px;
      background: var(--glass-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--glass-border);
    }

    /* Main Content Area */
    .hero-section {
      flex: 1;
      padding: 0 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 40px;
      z-index: 10;
    }

    .app-title {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      width: max-content;
      transition: all 0.2s ease;
    }

    .play-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    /* Horizontal App Carousel */
    .app-carousel {
      display: flex;
      gap: 15px;
      padding: 20px 60px 50px 60px;
      z-index: 10;
    }

    .app-icon {
      width: 100px;
      height: 100px;
      background: var(--glass-bg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
    }

    .app-icon i {
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .app-icon.active {
      transform: scale(1.15) translateY(-10px);
      border-color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
    }

    .app-icon.active i {
      color: var(--text-main);
    }

    /* Game/App Fullscreen Overlay */
    .app-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
    }

    .app-overlay.launch {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-header {
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 30px;
      background: rgba(0, 0, 0, 0.8);
      gap: 15px;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .close-btn:hover {
      color: white;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #121212;
    }

    .ambient-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center/cover;
      opacity: 0.3;
      filter: blur(20px);
    }
  </style>
</head>
<body>

  <div class="ambient-bg"></div>

  <div class="top-bar">
    <div class="nav-links">
      <span class="nav-link active">Apps</span>
      <span class="nav-link">Media</span>
    </div>
    <div class="status-area">
      <span id="clock">12:00 PM</span>
      <i class="fa-solid fa-gear" style="cursor: pointer; color: var(--text-muted)"></i>
      <div class="profile-icon">
        <i class="fa-solid fa-user" style="font-size: 0.9rem;"></i>
      </div>
    </div>
  </div>

  <div class="hero-section">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/playstation.svg" style="width: 40px; margin-bottom: 20px; filter: invert(1); opacity: 0.8;">
    <h1 class="app-title">Flint Store</h1>
    <button class="play-btn" id="launchBtn">
      <i class="fa-solid fa-play"></i> Open App
    </button>
  </div>

  <div class="app-carousel">
    <div class="app-icon active">
      <i class="fa-solid fa-store"></i>
    </div>
    <div class="app-icon" style="opacity: 0.5; cursor: default;">
      <i class="fa-solid fa-plus"></i>
    </div>
  </div>

  <div class="app-overlay" id="appOverlay">
    <div class="overlay-header">
      <button class="close-btn" id="closeAppBtn"><i class="fa-solid fa-circle-left"></i></button>
      <span style="font-weight: 600;">Flint Store</span>
    </div>
    <iframe id="storeFrame" src="about:blank"></iframe>
  </div>

  <script>
    // Live Clock
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12; // the hour '0' should be '12'
      minutes = minutes < 10 ? '0' + minutes : minutes;
      document.getElementById('clock').textContent = hours + ':' + minutes + ' ' + ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // App Launching Logic
    const launchBtn = document.getElementById('launchBtn');
    const closeAppBtn = document.getElementById('closeAppBtn');
    const appOverlay = document.getElementById('appOverlay');
    const storeFrame = document.getElementById('storeFrame');

    launchBtn.onclick = () => {
      // Simulate PS5 quick load
      appOverlay.classList.add('launch');
      setTimeout(() => {
        storeFrame.src = "store.html";
      }, 300);
    };

    closeAppBtn.onclick = () => {
      appOverlay.classList.remove('launch');
      setTimeout(() => {
        storeFrame.src = "about:blank"; // Clear memory
      }, 400);
    };
  </script>
</body>
</html>
