<style>
    .store-screen {
        height: 100%;
        background: radial-gradient(circle at top right, #001f4d, #000000);
        padding: 30px 50px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .store-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
    }
    .back-btn {
        background: rgba(255,255,255,0.1);
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
        transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
    .store-title {
        font-size: 1.8rem;
        font-weight: 300;
        margin: 0;
        letter-spacing: 1px;
    }
    
    .store-nav {
        display: flex;
        gap: 30px;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
    }
    .store-nav span { opacity: 0.6; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
    .store-nav span:hover { opacity: 1; }
    .store-nav span.active { opacity: 1; border-bottom: 2px solid #fff; padding-bottom: 16px; margin-bottom: -16px; }

    .store-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        overflow-y: auto;
        padding-right: 10px;
    }
    .store-grid::-webkit-scrollbar { width: 0; }
    
    .store-item {
        height: 280px;
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 15px;
        transition: all 0.2s;
        cursor: pointer;
        border: 1px solid transparent;
        position: relative;
        overflow: hidden;
    }
    .store-item::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        z-index: 1;
    }
    .store-item > * { position: relative; z-index: 2; }
    .store-item:hover {
        transform: translateY(-5px) scale(1.02);
        background: rgba(255,255,255,0.1);
        border-color: #0070cc;
        box-shadow: 0 10px 20px rgba(0, 112, 204, 0.4);
    }
    .item-title { margin: 0; font-size: 1rem; font-weight: 500; }
    .item-price { color: #fff; font-weight: bold; margin-top: 5px; font-size: 0.9rem; background: #0070cc; padding: 4px 8px; border-radius: 4px; align-self: flex-start; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
<div class="store-screen">
    <div class="store-header">
        <button class="back-btn" id="back-btn">←</button>
        <h2 class="store-title">FlintOS Store</h2>
    </div>
    <div class="store-nav">
        <span class="active">Latest</span>
        <span>Collections</span>
        <span>Deals</span>
        <span>Subscriptions</span>
    </div>
    <div class="store-grid">
        <div class="store-item" style="background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400') center/cover;"><p class="item-title">Neon Drifter</p><p class="item-price">$69.99</p></div>
        <div class="store-item" style="background: url('https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400') center/cover;"><p class="item-title">Space Frontier</p><p class="item-price">$49.99</p></div>
        <div class="store-item" style="background: url('https://images.unsplash.com/photo-1605901309584-818e25960b8f?w=400') center/cover;"><p class="item-title">Cyber Battle</p><p class="item-price">$19.99</p></div>
        <div class="store-item" style="background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400') center/cover;"><p class="item-title">Retro Pass</p><p class="item-price">$29.99</p></div>
        <div class="store-item"><p class="item-title">Flint Coins</p><p class="item-price">$9.99</p></div>
    </div>
</div>
