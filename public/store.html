<style>
    .store-screen {
        height: 100%; background: #000; padding: 40px 60px; box-sizing: border-box;
        display: flex; flex-direction: column; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .store-header { display: flex; align-items: center; gap: 25px; margin-bottom: 35px; }
    .back-btn {
        background: rgba(255,255,255,0.1); border: none; color: white; width: 45px; height: 45px;
        border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
        transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
    .store-title { font-size: 2rem; font-weight: 300; margin: 0; }
    
    .store-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        overflow-y: auto; padding-right: 15px; padding-bottom: 40px;
    }
    .store-grid::-webkit-scrollbar { width: 0; }
    
    .store-item {
        height: 320px; border-radius: 16px; display: flex; flex-direction: column; justify-content: flex-end;
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s;
        border: 2px solid transparent; overflow: hidden; position: relative;
    }
    .store-item:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.3); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
    
    .item-content { padding: 20px; z-index: 2; }
    .item-title { margin: 0 0 12px 0; font-size: 1.4rem; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
    
    .install-btn {
        background: #fff; color: #000; border: none; padding: 8px 18px; border-radius: 20px;
        font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
        display: inline-flex; align-items: center; gap: 8px;
    }
    .install-btn:hover { background: #e0e0e0; transform: scale(1.05); }
    .install-btn.installed { background: rgba(255,255,255,0.2); color: #fff; pointer-events: none; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="store-screen">
    <div class="store-header">
        <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i></button>
        <h2 class="store-title">Store</h2>
    </div>
    
    <div class="store-grid" id="dynamic-store-grid"></div>
</div>
