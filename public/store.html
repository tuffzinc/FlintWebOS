<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<style>
    .store-screen {
        height: 100%;
        background: radial-gradient(circle at top right, #0a142c 0%, #03050a 100%);
        padding: 40px 60px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        animation: storeSlideUp 0.5s cubic-bezier(0.15, 0.85, 0.2, 1) forwards;
    }
    
    @keyframes storeSlideUp {
        from { opacity: 0; transform: translateY(25px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .store-header {
        display: flex;
        align-items: center;
        gap: 25px;
        margin-bottom: 35px;
    }
    
    .back-btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        color: white;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .back-btn:hover {
        background: #ffffff;
        color: #03050a;
        transform: scale(1.08) translateX(-2px);
        box-shadow: 0 5px 15px rgba(255,255,255,0.2);
    }
    
    .store-title {
        font-size: 2rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.5px;
    }
    
    .store-nav {
        display: flex;
        gap: 35px;
        margin-bottom: 35px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding-bottom: 15px;
    }
    .store-nav span {
        opacity: 0.5;
        cursor: pointer;
        font-weight: 600;
        transition: opacity 0.25s ease;
        font-size: 1.05rem;
    }
    .store-nav span:hover { opacity: 0.9; }
    .store-nav span.active {
        opacity: 1;
        position: relative;
    }
    .store-nav span.active::after {
        content: '';
        position: absolute;
        bottom: -16px; left: 0;
        width: 100%; height: 3px;
        background: #4364f7;
        box-shadow: 0 0 10px #4364f7;
    }

    .store-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 25px;
        overflow-y: auto;
        padding-bottom: 20px;
    }
    .store-grid::-webkit-scrollbar { width: 6px; }
    .store-grid::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
    }
    
    .store-item {
        height: 320px;
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        transition: all 0.35s cubic-bezier(0.15, 0.85, 0.2, 1);
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.05);
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .store-item::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0);
        transition: background 0.3s ease;
        z-index: 1;
    }
    .store-item:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: #4364f7;
        box-shadow: 0 15px 35px rgba(67, 100, 247, 0.35), 0 10px 20px rgba(0,0,0,0.5);
    }
    .store-item:hover::before { background: rgba(67, 100, 247, 0.05); }
    
    .store-item-details {
        position: relative;
        z-index: 2;
        padding: 20px;
        width: 100%;
        box-sizing: border-box;
    }
    .item-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
        text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        letter-spacing: -0.2px;
    }
    .item-price {
        color: #fff;
        font-weight: 700;
        margin-top: 12px;
        font-size: 0.85rem;
        background: linear-gradient(135deg, #0070cc, #005299);
        padding: 7px 16px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 4px 12px rgba(0, 112, 204, 0.3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>

<div class="store-screen">
    <div class="store-header">
        <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i></button>
        <h2 class="store-title">FlintOS Store</h2>
    </div>
    <div class="store-nav">
        <span class="active">All Software</span>
        <span>Collections</span>
        <span>Deals</span>
        <span>Subscriptions</span>
    </div>
    <div class="store-grid" id="dynamic-store-grid"></div>
</div>
