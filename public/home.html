<style>
    .home-screen {
        height: 100%;
        background-position: center center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        padding: 50px 70px;
        box-sizing: border-box;
        animation: dashboardFadeIn 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        transition: background-image 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        background-image: linear-gradient(180deg, rgba(10,16,32,0.85) 0%, rgba(3,5,10,0.98) 100%);
    }
    
    @keyframes dashboardFadeIn {
        from { opacity: 0; transform: scale(1.01); }
        to { opacity: 1; transform: scale(1); }
    }
    
    .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 45px;
    }
    
    .tabs {
        display: flex;
        gap: 35px;
        font-size: 1.25rem;
    }
    
    .tabs span {
        opacity: 0.5;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
        padding-bottom: 4px;
        letter-spacing: 0.5px;
    }
    
    .tabs span:hover {
        opacity: 0.9;
    }
    
    .tabs span.active {
        opacity: 1;
        font-weight: 700;
    }
    
    .tabs span.active::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0;
        width: 100%; height: 3px;
        background: #ffffff;
        border-radius: 2px;
        box-shadow: 0 0 10px #ffffff;
    }
    
    .status-icons {
        display: flex;
        gap: 28px;
        align-items: center;
        font-size: 1.15rem;
    }
    
    .status-icons i {
        cursor: pointer;
        opacity: 0.6;
        transition: all 0.2s ease;
    }
    .status-icons i:hover {
        opacity: 1;
        transform: scale(1.1);
    }
    
    #current-time {
        font-weight: 600;
        letter-spacing: 1px;
        opacity: 0.9;
    }

    .app-row {
        display: flex;
        gap: 20px;
        align-items: center;
        margin-bottom: 40px;
        min-height: 110px;
        overflow-x: auto;
        padding: 10px 5px;
    }
    .app-row::-webkit-scrollbar {
        display: none;
    }
    
    .app-icon {
        width: 75px;
        height: 75px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        cursor: pointer;
        transition: all 0.35s cubic-bezier(0.15, 0.85, 0.2, 1);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        flex-shrink: 0;
        position: relative;
    }
    
    .app-icon:hover {
        transform: translateY(-6px);
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.25);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
    }
    
    .app-icon.active {
        width: 90px;
        height: 90px;
        border-color: #ffffff;
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 15px 35px rgba(255, 255, 255, 0.15), 0 10px 30px rgba(0, 0, 0, 0.7);
        transform: translateY(-6px);
    }
    
    .system-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .system-btn i {
        font-size: 20px;
        opacity: 0.9;
    }
    .system-btn span {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        opacity: 0.8;
    }
    
    .store-btn {
        background: linear-gradient(135deg, #0052d4, #4364f7);
        border-color: rgba(255, 255, 255, 0.15);
    }
    .store-btn:hover {
        background: linear-gradient(135deg, #0066ff, #5377ff);
        box-shadow: 0 12px 30px rgba(67, 100, 247, 0.4);
    }

    .library-btn {
        background: linear-gradient(135deg, #2c3e50, #3498db);
        border-color: rgba(255, 255, 255, 0.15);
    }
    .library-btn:hover {
        background: linear-gradient(135deg, #34495e, #4aa3df);
        box-shadow: 0 12px 30px rgba(52, 152, 219, 0.4);
    }

    .hero-container {
        margin-top: auto;
        padding-bottom: 30px;
        max-width: 750px;
    }
    
    .hero-title {
        font-size: 4rem;
        margin: 0 0 15px 0;
        font-weight: 800;
        letter-spacing: -0.5px;
        text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        line-height: 1.1;
    }
    
    .hero-desc {
        font-size: 1.2rem;
        opacity: 0.75;
        line-height: 1.6;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        margin-bottom: 35px;
    }
    
    .action-btn {
        background: #ffffff;
        color: #050814;
        border: none;
        padding: 16px 45px;
        border-radius: 40px;
        font-weight: 700;
        cursor: pointer;
        font-size: 1.1rem;
        box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        display: inline-flex;
        align-items: center;
        gap: 12px;
        letter-spacing: 0.5px;
    }
    
    .action-btn:hover {
        transform: translateY(-3px);
        background: #f5f6fa;
        box-shadow: 0 12px 30px rgba(255,255,255,0.2), 0 8px 25px rgba(0,0,0,0.6);
    }
    
    .empty-state-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 35px;
        border-radius: 24px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .empty-state-card .hero-title {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 10px;
    }
    .empty-state-card .hero-desc {
        font-size: 1.05rem;
        margin-bottom: 0;
        opacity: 0.6;
    }
</style>

<div class="home-screen" id="home-screen">
    <div class="header-bar">
        <div class="tabs">
            <span class="active">Games</span>
            <span>Media</span>
        </div>
        <div class="status-icons">
            <i class="fas fa-magnifying-glass"></i>
            <i class="fas fa-gear"></i>
            <i class="fas fa-circle-user"></i>
            <span id="current-time">--:--</span>
        </div>
    </div>

    <div class="app-row" id="dynamic-app-row"></div>

    <div class="hero-container">
        <div id="hero-content" style="display: none;">
            <h1 class="hero-title" id="hero-title">Select a Game</h1>
            <p class="hero-desc" id="hero-desc">Choose a game from your recent list to start playing.</p>
            <button class="action-btn" id="play-btn"><i class="fas fa-play"></i> Play Game</button>
        </div>
        
        <div id="empty-state" style="display: none;">
            <div class="empty-state-card">
                <h1 class="hero-title">Welcome to FlintOS</h1>
                <p class="hero-desc">Your library is currently empty. Open the <strong>Store</strong> panel above to add games directly to your system.</p>
            </div>
        </div>
    </div>
</div>
