<style>
    .home-screen {
        height: 100%; background-position: center center; background-size: cover;
        display: flex; flex-direction: column; padding: 40px 60px; box-sizing: border-box;
        animation: fadeIn 0.5s ease-out; transition: background-image 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .tabs { display: flex; gap: 30px; font-size: 1.2rem; }
    .tabs span { opacity: 0.5; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .tabs span:hover { opacity: 0.8; }
    .tabs span.active { opacity: 1; font-weight: bold; transform: scale(1.05); }
    
    .status-icons { display: flex; gap: 24px; align-items: center; font-size: 1.2rem; opacity: 0.9; }
    .status-icons i { cursor: pointer; transition: transform 0.2s; }
    .status-icons i:hover { transform: scale(1.15); color: #fff; }

    .app-row { display: flex; gap: 15px; align-items: center; margin-bottom: 30px; min-height: 100px; }
    .app-icon {
        width: 65px; height: 65px; border-radius: 16px; background: rgba(255,255,255,0.1);
        background-size: cover; background-position: center; backdrop-filter: blur(10px);
        cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .app-icon:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.3); }
    .app-icon.active {
        width: 80px; height: 80px; border-color: #ffffff;
        box-shadow: 0 15px 30px rgba(0,0,0,0.6); transform: translateY(-5px);
    }
    
    .system-btn {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-size: 12px; font-weight: bold; gap: 6px; letter-spacing: 0.5px;
    }
    #store-btn { background: linear-gradient(135deg, #004e92, #000428); color: white; }
    #library-btn { background: rgba(255,255,255,0.15); color: white; }

    .hero-container { margin-top: auto; padding-bottom: 20px; }
    .hero-title { font-size: 3.5rem; margin: 0 0 10px 0; font-weight: 300; text-shadow: 0 4px 15px rgba(0,0,0,0.9); }
    .hero-desc { font-size: 1.1rem; opacity: 0.8; max-width: 600px; line-height: 1.5; text-shadow: 0 2px 8px rgba(0,0,0,0.8); margin-bottom: 25px; }
    
    .action-btn {
        background: #ffffff; color: #000000; border: none; padding: 14px 40px;
        border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.05rem;
        box-shadow: 0 6px 15px rgba(0,0,0,0.4); transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px;
    }
    .action-btn:hover { transform: scale(1.03); background: #f0f0f0; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<div class="home-screen" id="home-screen">
    <div class="header-bar">
        <div class="tabs">
            <span class="active">Games</span>
            <span>Media</span>
        </div>
        <div class="status-icons">
            <i class="fas fa-magnifying-glass"></i>
            <i class="fas fa-gear"></i>
            <i class="fas fa-circle-user"></i>
            <span id="current-time">--:--</span>
        </div>
    </div>

    <div class="app-row" id="dynamic-app-row">
        <div class="app-icon system-btn" id="library-btn">
            <i class="fas fa-gamepad" style="font-size: 18px;"></i>
            <span>Library</span>
        </div>
        <div class="app-icon system-btn" id="store-btn">
            <i class="fas fa-bag-shopping" style="font-size: 18px;"></i>
            <span>Store</span>
        </div>
    </div>

    <div class="hero-container">
        <div id="hero-content" style="display: none;">
            <h1 class="hero-title" id="hero-title">Select a Game</h1>
            <p class="hero-desc" id="hero-desc">Choose a game from your recent list to start playing.</p>
            <button class="action-btn" id="play-btn"><i class="fas fa-play"></i> Play</button>
        </div>
        
        <div id="empty-state" style="display: none; max-width: 500px;">
            <h1 class="hero-title" style="font-size: 2.5rem;">Welcome to FlintOS</h1>
            <p class="hero-desc">You don't have any games installed yet. Visit the Store to discover and download games to your library.</p>
        </div>
    </div>
</div>
