<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/tabs@main/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
      body {
        background-color: black;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: sans-serif;
      }
      #gameContainer {
        width: 100vw !important;
        height: 100vh !important;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
      }
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: url('banner.png') no-repeat center center;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      #loading-text {
        font-weight: 900;
        font-size: 42px;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 
          -2px -2px 0 #000,  
           2px -2px 0 #000,
          -2px  2px 0 #000,
           2px  2px 0 #000,
          -3px  0px 0 #000,
           3px  0px 0 #000,
           0px  3px 0 #000,
           0px -3px 0 #000;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div id="loading-text">LOADING... 0.00 MB / 1746.00 MB</div>
    </div>

    <div id="gameContainer"></div>
    <script src="Build/UnityLoader.js"></script>
    <script>
    const loadingScreen = document.querySelector("#loading-screen");
    const loadingText = document.querySelector("#loading-text");
    let totalBytes = 0;
    let loadedBytes = 0;

    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      let chunks = [];
      let received = 0;
      while (true) {
        const {
          done,
          value
        } = await reader.read();
        if (done) break;
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);
        let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        let mbTotal = '1746.00';
        loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
      }
      let fullBuffer = new Uint8Array(received);
      let offset = 0;
      for (let chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
      }
      return fullBuffer.buffer;
    }

    async function mergeFiles(fileParts, cacheKey) {
      const cache = await caches.open("tabs-cache");
      const cachedResponse = await cache.match(cacheKey);
      if (cachedResponse) {
        const blob = await cachedResponse.blob();
        return URL.createObjectURL(blob);
      }
      const buffers = await Promise.all(
        fileParts.map(part => fetchWithProgress(part))
      );
      const mergedBlob = new Blob(buffers);
      const response = new Response(mergedBlob);
      await cache.put(cacheKey, response);
      return URL.createObjectURL(mergedBlob);
    }

    function getParts(file, start, end) {
      let parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
      }
      return parts;
    }
    (async () => {
      const [dataUrl, wasmUrl, asmUrl] = await Promise.all([
        mergeFiles(getParts("Build/tabs.data.unityweb", 1, 86), "tabs.data.unityweb"),
        mergeFiles(getParts("Build/tabs.wasm.code.unityweb", 1, 3), "tabs.wasm.code.unityweb"),
      ]);

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url, ...rest) {
          if (url.includes("tabs.data.unityweb")) {
              url = dataUrl;
          } else if (url.includes("tabs.wasm.code.unityweb")) {
              url = wasmUrl;
          }
          return originalOpen.call(this, method, url, ...rest);
      };
      var unityInstance = UnityLoader.instantiate("gameContainer", "Build/tabs.json");
      loadingScreen.remove();
    })();
    </script>
  </body>
</html>
