<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlintOS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
    </style>
</head>
<body>

    <flintos-app></flintos-app>

    <script>
        class FlintOSApp extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
            }

            async connectedCallback() {
                this.shadowRoot.innerHTML = `
                    <style>
                        :host { display: block; width: 100vw; height: 100vh; }
                        #app-container { width: 100%; height: 100%; position: relative; }
                    </style>
                    <div id="app-container"></div>
                `;
                this.container = this.shadowRoot.getElementById('app-container');
                
                await this.loadView('/public/loading.html');
                
                setTimeout(() => {
                    const hasVisited = localStorage.getItem('flintos_visited');
                    if (!hasVisited) {
                        this.loadView('/public/welcome.html');
                    } else {
                        this.loadView('/public/home.html');
                    }
                }, 2000);
            }

            async loadView(filename) {
                try {
                    const response = await fetch(filename);
                    const html = await response.text();
                    this.container.innerHTML = html;
                    this.bindEvents();
                } catch (err) {
                    console.error("Error loading view:", err);
                }
            }

            bindEvents() {
                const enterBtn = this.shadowRoot.getElementById('enter-home');
                if (enterBtn) {
                    enterBtn.addEventListener('click', () => {
                        localStorage.setItem('flintos_visited', 'true');
                        this.loadView('/public/home.html');
                    });
                }

                const storeBtn = this.shadowRoot.getElementById('store-btn');
                if (storeBtn) {
                    storeBtn.addEventListener('click', () => this.loadView('/public/store.html'));
                }

                const backBtn = this.shadowRoot.getElementById('back-btn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => this.loadView('/public/home.html'));
                }
                
                const timeEl = this.shadowRoot.getElementById('current-time');
                if(timeEl) {
                    const now = new Date();
                    timeEl.textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            }
        }

        customElements.define('flintos-app', FlintOSApp);
    </script>
</body>
</html>
