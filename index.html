<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlintOS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <flintos-app></flintos-app>

    <script>
        class FlintOSApp extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.currentActiveFileSrc = '';
                this.currentGameId = null;
                this.lastRightCtrl = 0;
                this.gamesDb = []; // Local cache for system games
            }

            async connectedCallback() {
                this.shadowRoot.innerHTML = `
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <style>
                        :host { display: block; width: 100vw; height: 100vh; }
                        #app-container { width: 100%; height: 100%; position: relative; }
                        
                        /* Sandboxed Game Engine Player Overlay Styles */
                        #game-layer {
                            display: none;
                            position: fixed;
                            top: 0; left: 0;
                            width: 100vw; height: 100vh;
                            z-index: 99999;
                            background-color: #000000;
                        }
                        #game-frame {
                            width: 100%; height: 100%;
                            border: none;
                            background-color: #000000;
                        }
                        
                        /* PS5 Style Quick Menu Control Overlay */
                        #quick-menu-overlay {
                            display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
                            background: rgba(0,0,0,0.4); z-index: 100000;
                            justify-content: center; align-items: flex-end; padding-bottom: 40px;
                        }
                        .ps5-quick-menu {
                            display: flex; gap: 30px; background: rgba(20, 20, 25, 0.85);
                            padding: 20px 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
                            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
                            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
                            animation: slideUpMenu 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
                        }
                        .qm-btn {
                            background: transparent; border: none; color: white;
                            display: flex; flex-direction: column; align-items: center; gap: 10px;
                            cursor: pointer; opacity: 0.6; transition: all 0.2s; font-size: 0.85rem; font-weight: 500;
                        }
                        .qm-btn i { font-size: 1.5rem; margin-bottom: 4px; }
                        .qm-btn:hover { opacity: 1; transform: scale(1.1); color: #fff; }
                        .qm-btn:hover i { text-shadow: 0 0 15px rgba(255,255,255,0.8); }

                        /* Flash feedback mechanics */
                        #screen-flash {
                            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                            background: white; z-index: 100001; pointer-events: none;
                        }
                        #toast {
                            position: absolute; top: 30px; right: 30px; background: rgba(0,0,0,0.9);
                            padding: 15px 25px; border-radius: 12px; display: none; align-items: center; gap: 12px;
                            z-index: 100002; border-left: 4px solid #fff; font-weight: bold;
                        }

                        @keyframes slideUpMenu { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                    </style>
                    
                    <div id="app-container"></div>
                    
                    <div id="game-layer">
                        <iframe id="game-frame" src="about:blank"></iframe>
                        <div id="quick-menu-overlay">
                            <div class="ps5-quick-menu">
                                <button class="qm-btn" id="qm-resume"><i class="fas fa-play"></i> Resume</button>
                                <button class="qm-btn" id="qm-screenshot"><i class="fas fa-camera"></i> Screenshot</button>
                                <button class="qm-btn" id="qm-close" style="color: #ff4d4d;"><i class="fas fa-power-off"></i> Close Game</button>
                            </div>
                        </div>
                    </div>
                    <div id="screen-flash"></div>
                    <div id="toast"><i class="fas fa-image"></i> Screenshot Saved</div>
                `;
                this.container = this.shadowRoot.getElementById('app-container');
                this.setupGlobalHotkeys();
                
                await this.loadView('/public/loading.html');
                
                setTimeout(() => {
                    const hasVisited = localStorage.getItem('flintos_visited');
                    if (!hasVisited) {
                        this.loadView('/public/welcome.html');
                    } else {
                        this.loadView('/public/home.html');
                    }
                }, 2200);
            }

            setupGlobalHotkeys() {
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Control' && e.location === 2) { // Right Control Key
                        const now = Date.now();
                        const gameLayer = this.shadowRoot.getElementById('game-layer');
                        if (now - this.lastRightCtrl < 400 && gameLayer.style.display === 'block') {
                            this.toggleQuickMenu();
                        }
                        this.lastRightCtrl = now;
                    }
                });

                // HUD Panel Event Listeners
                this.shadowRoot.getElementById('qm-resume').onclick = () => this.toggleQuickMenu(false);
                this.shadowRoot.getElementById('qm-close').onclick = () => {
                    this.toggleQuickMenu(false);
                    const gameLayer = this.shadowRoot.getElementById('game-layer');
                    const gameFrame = this.shadowRoot.getElementById('game-frame');
                    if (gameLayer && gameFrame) {
                        gameFrame.src = 'about:blank';
                        gameLayer.style.display = 'none';
                        this.loadView('/public/home.html'); // Bounce back home to update timeline order
                    }
                };
                this.shadowRoot.getElementById('qm-screenshot').onclick = () => {
                    this.toggleQuickMenu(false);
                    const flash = this.shadowRoot.getElementById('screen-flash');
                    const toast = this.shadowRoot.getElementById('toast');
                    flash.style.display = 'block'; flash.style.opacity = '1';
                    let fade = 1;
                    const fadeOut = setInterval(() => {
                        fade -= 0.1; flash.style.opacity = fade;
                        if (fade <= 0) { clearInterval(fadeOut); flash.style.display = 'none'; }
                    }, 30);
                    toast.style.display = 'flex';
                    setTimeout(() => { toast.style.display = 'none'; }, 2500);
                };
            }

            toggleQuickMenu(forceState) {
                const menu = this.shadowRoot.getElementById('quick-menu-overlay');
                const isShowing = menu.style.display === 'flex';
                menu.style.display = (forceState !== undefined) ? (forceState ? 'flex' : 'none') : (isShowing ? 'none' : 'flex');
            }

            async loadView(filename) {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}`);
                    const html = await response.text();
                    this.container.innerHTML = html;
                    this.bindEvents(filename);
                } catch (err) {
                    console.error("FlintOS Core Error loading view:", err);
                }
            }

            bindEvents(currentView) {
                const enterBtn = this.shadowRoot.getElementById('enter-home');
                if (enterBtn) {
                    enterBtn.addEventListener('click', () => {
                        localStorage.setItem('flintos_visited', 'true');
                        this.loadView('/public/home.html');
                    });
                }

                const storeBtn = this.shadowRoot.getElementById('store-btn');
                if (storeBtn) {
                    storeBtn.addEventListener('click', () => this.loadView('/public/store.html'));
                }

                const backBtn = this.shadowRoot.getElementById('back-btn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => this.loadView('/public/home.html'));
                }

                const playBtn = this.shadowRoot.getElementById('play-btn');
                if (playBtn) {
                    playBtn.addEventListener('click', () => {
                        if (this.currentActiveFileSrc) {
                            this.launchIframeRuntime(this.currentActiveFileSrc, this.currentGameId);
                        } else {
                            alert("FlintOS Error: No execution sequence target loaded.");
                        }
                    });
                }
                
                const timeEl = this.shadowRoot.getElementById('current-time');
                if (timeEl) {
                    const updateTime = () => {
                        const now = new Date();
                        timeEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    };
                    updateTime();
                }

                if (currentView === '/public/home.html') {
                    this.loadGamesData('home');
                } else if (currentView === '/public/store.html') {
                    this.loadGamesData('store');
                } else if (currentView === '/public/library.html') {
                    this.loadGamesData('library');
                }
            }

            async loadGamesData(targetLayer) {
                try {
                    if (this.gamesDb.length === 0) {
                        const response = await fetch('/data/games.json');
                        this.gamesDb = await response.json();
                    }
                    
                    const installedIds = JSON.parse(localStorage.getItem('flintos_installed')) || [];
                    const recentIds = JSON.parse(localStorage.getItem('flintos_recent')) || [];

                    if (targetLayer === 'home') {
                        this.renderHomeGames(this.gamesDb, installedIds, recentIds);
                    } else if (targetLayer === 'store') {
                        this.renderStoreGames(this.gamesDb, installedIds);
                    } else if (targetLayer === 'library') {
                        this.renderLibraryGames(this.gamesDb, installedIds);
                    }
                } catch (error) {
                    console.error("FlintOS FileSystem Error reading games.json:", error);
                }
            }

            renderHomeGames(games, installedIds, recentIds) {
                const appRow = this.shadowRoot.getElementById('dynamic-app-row');
                if (!appRow) return;

                appRow.innerHTML = '';
                
                // 1. Setup Static Store Anchor Button
                const storeBtn = document.createElement('div');
                storeBtn.className = 'app-icon store-btn';
                storeBtn.id = 'store-btn';
                storeBtn.innerHTML = `<i class="fas fa-bag-shopping" style="font-size: 16px;"></i><span>Store</span>`;
                storeBtn.addEventListener('click', () => this.loadView('/public/store.html'));
                appRow.appendChild(storeBtn);

                // 2. Filter down into user saved/installed applications ordered by timeline usage
                let orderedGames = [];
                recentIds.forEach(id => {
                    const match = games.find(g => g.id === id && installedIds.includes(g.id));
                    if (match) orderedGames.push(match);
                });
                
                // Fallback catch: Append installed games not tracked in usage lists yet
                games.forEach(g => {
                    if (installedIds.includes(g.id) && !orderedGames.some(og => og.id === g.id)) {
                        orderedGames.push(g);
                    }
                });

                // Render out matching app tile nodes
                orderedGames.forEach((game) => {
                    const icon = document.createElement('div');
                    icon.className = 'app-icon';
                    icon.style.backgroundImage = `url('${game.image}')`;
                    icon.style.backgroundSize = 'cover';
                    icon.style.backgroundPosition = 'center';
                    icon.style.backgroundRepeat = 'no-repeat';
                    
                    icon.addEventListener('click', () => this.updateDashboardHero(game, icon));
                    appRow.appendChild(icon);
                });

                // 3. Setup Static Library Anchor Button
                const libraryIcon = document.createElement('div');
                libraryIcon.className = 'app-icon library-icon';
                libraryIcon.style.background = 'rgba(255,255,255,0.05)';
                libraryIcon.style.display = 'flex';
                libraryIcon.style.alignItems = 'center';
                libraryIcon.style.justifyContent = 'center';
                libraryIcon.style.fontSize = '11px';
                libraryIcon.style.color = 'rgba(255,255,255,0.6)';
                libraryIcon.innerHTML = `<i class="fas fa-layer-group" style="margin-bottom:4px; font-size:14px; display:block; text-align:center;"></i><span>Library</span>`;
                libraryIcon.style.flexDirection = 'column';
                libraryIcon.addEventListener('click', () => this.loadView('/public/library.html'));
                appRow.appendChild(libraryIcon);

                if (orderedGames.length > 0) {
                    const firstGameIcon = appRow.querySelector('.app-icon:not(.store-btn):not(.library-icon)');
                    if (firstGameIcon) {
                        this.updateDashboardHero(orderedGames[0], firstGameIcon);
                    }
                } else {
                    // Empty System State Fallback Screen
                    const title = this.shadowRoot.getElementById('hero-title');
                    const desc = this.shadowRoot.getElementById('hero-desc');
                    if (title) title.textContent = "Welcome to FlintOS";
                    if (desc) desc.textContent = "Your dashboard is currently clear. Head over to the Store launcher tile above to install applications directly onto your system environment.";
                }
            }

            renderStoreGames(games, installedIds) {
                const storeGrid = this.shadowRoot.getElementById('dynamic-store-grid');
                if (!storeGrid) return;

                storeGrid.innerHTML = '';

                games.forEach((game) => {
                    const isInstalled = installedIds.includes(game.id);
                    const item = document.createElement('div');
                    item.className = 'store-item';
                    
                    // FIXED: Appending "no-repeat" to prevent fractional sub-pixel background leak line glitches
                    item.style.background = `linear-gradient(to top, rgba(0,0,0,0.95) 15%, rgba(0,0,0,0.15) 100%), url('${game.bg || game.image}') center / cover no-repeat`;
                    
                    item.innerHTML = `
                        <p class="item-title">${game.name}</p>
                        <p class="item-price" style="${isInstalled ? 'background:#3a3a44;' : ''}">
                            <i class="${isInstalled ? 'fas fa-check' : 'fas fa-download'}" style="font-size:10px; margin-right:5px;"></i> 
                            ${isInstalled ? 'Saved' : 'Save Game'}
                        </p>
                    `;
                    
                    item.addEventListener('click', () => {
                        if (!isInstalled) {
                            let installed = JSON.parse(localStorage.getItem('flintos_installed')) || [];
                            if (!installed.includes(game.id)) {
                                installed.push(game.id);
                                localStorage.setItem('flintos_installed', JSON.stringify(installed));
                            }
                            this.trackRecentUsage(game.id);
                            this.loadView('/public/store.html'); // Refresh layer state values instantly
                        } else {
                            this.launchIframeRuntime(game.file_src, game.id);
                        }
                    });
                    
                    storeGrid.appendChild(item);
                });
            }

            renderLibraryGames(games, installedIds) {
                const libraryGrid = this.shadowRoot.getElementById('dynamic-library-grid');
                if (!libraryGrid) return;
                libraryGrid.innerHTML = '';

                const savedGames = games.filter(game => installedIds.includes(game.id));

                if (savedGames.length === 0) {
                    libraryGrid.innerHTML = `<p style="opacity:0.5; grid-column: 1 / -1; text-align:center; padding: 40px;">No saved games found. Add software from the FlintOS Store layout panels.</p>`;
                    return;
                }

                savedGames.forEach((game) => {
                    const item = document.createElement('div');
                    item.className = 'store-item';
                    item.style.background = `linear-gradient(to top, rgba(0,0,0,0.95) 15%, rgba(0,0,0,0.15) 100%), url('${game.bg || game.image}') center / cover no-repeat`;
                    item.innerHTML = `
                        <p class="item-title">${game.name}</p>
                        <p class="item-price"><i class="fas fa-gamepad" style="font-size:10px; margin-right:5px;"></i> Launch</p>
                    `;
                    item.addEventListener('click', () => {
                        this.launchIframeRuntime(game.file_src, game.id);
                    });
                    libraryGrid.appendChild(item);
                });
            }

            updateDashboardHero(game, selectedIcon) {
                this.shadowRoot.querySelectorAll('.app-icon').forEach(el => el.classList.remove('active'));
                selectedIcon.classList.add('active');

                this.currentActiveFileSrc = game.file_src;
                this.currentGameId = game.id;

                const screen = this.shadowRoot.getElementById('home-screen');
                const title = this.shadowRoot.getElementById('hero-title');
                const desc = this.shadowRoot.getElementById('hero-desc');

                if (screen) {
                    screen.style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.9) 100%), url('${game.bg}')`;
                }
                if (title) title.textContent = game.name;
                if (desc) desc.textContent = game.description;
            }

            trackRecentUsage(gameId) {
                let recents = JSON.parse(localStorage.getItem('flintos_recent')) || [];
                recents = recents.filter(id => id !== gameId); // Strip pre-existing positions
                recents.unshift(gameId); // Push into index position 0
                if(recents.length > 12) recents.pop();
                localStorage.setItem('flintos_recent', JSON.stringify(recents));
            }

            launchIframeRuntime(sourceUrl, gameId) {
                if (gameId) this.trackRecentUsage(gameId);
                const gameLayer = this.shadowRoot.getElementById('game-layer');
                const gameFrame = this.shadowRoot.getElementById('game-frame');
                if (gameLayer && gameFrame) {
                    gameFrame.src = sourceUrl;
                    gameLayer.style.display = 'block';
                }
            }
        }

        customElements.define('flintos-app', FlintOSApp);
    </script>
</body>
</html>
